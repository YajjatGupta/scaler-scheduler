services:
  - type: web
    name: scaler-scheduler-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scaler-scheduler-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: scaler-scheduler-db
    plan: free
    databaseName: scaler_scheduler
    user: scaler_scheduler
